name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # जब तपाईँ main branch मा push गर्नुहुन्छ यो चल्छ

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # यहाँ तपाईँको इमेजको नाम हुनेछ (सबै lowercase मा हुनुपर्छ)
          tags: ghcr.io/${{ github.repository_owner }}/nullbg-worker:latest
